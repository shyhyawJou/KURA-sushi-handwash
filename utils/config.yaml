camera:
    #crop_area: [0., 0., 1., 0.677662037037037]  # 0.25, 0.25, 0.75, 0.75
    #crop_area: [0., 0., 1., 0.7277]  # 0.25, 0.25, 0.75, 0.75
    crop_area: []
    wh: [1280, 960]
    video_path: 'output.mp4'

streamer:
    enable: true
    host: '127.0.0.1'
    port: 9527
    route: /meal
    size: [640, 480]
    quality: 40

AI:
    handwash:
        path: 'best_0.9470_0.9810_epoch_77_handwash-746_my.onnx'
        score_thresh: 0.5
        iou_thresh: 0.4
        input_wh: [448, 448]
        agnostic_nms: false
        classes:
            - 'left'
            - 'right'
            - 'step_1'
            - 'step_2'
            - 'step_3'
            - 'step_4'
            - 'step_5'
            - 'step_6'
            - 'step_7'

log:
    folder: 'log'
    level: INFO

video:
    base_dir: log/record/stream
    frame_w: 640
    frame_h: 480
    fps: 30
    periods: [
        [11, 12],
        [17, 18]
    ]
    bitrate: 3
    suffix: ''